<main>
  <div class="auth-shell">
    <div class="card">
      <h1>Criar conta</h1>
      <p class="lead">Cadastre-se para acompanhar seus pedidos</p>
      <div class="form-error" id="formError"></div>
      <form id="signupForm">
        <div class="field"><label>Nome completo</label><input type="text" name="name" required></div>
        <div class="field"><label>E-mail</label><input type="email" name="email" required></div>
        <div class="field"><label>Telefone / WhatsApp</label><input type="tel" name="phone" required></div>
        <div class="field"><label>Senha</label><input type="password" name="password" minlength="6" required></div>
        <button type="submit" class="btn btn-primary btn-block" id="submitBtn">Criar conta</button>
      </form>
      <p class="auth-switch">Já tem conta? <a href="login.html">Entrar</a></p>
    </div>
  </div>
</main>

<script src="js/config.js"></script>

<script src="js/auth.js"></script>
<script src="js/main.js"></script>
<script>
  document.getElementById('signupForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const errorBox = document.getElementById('formError');
    const submitBtn = document.getElementById('submitBtn');
    errorBox.style.display = 'none';
    submitBtn.disabled = true;
    submitBtn.innerHTML = '<span class="spinner"></span> Criando conta...';

    const formData = Object.fromEntries(new FormData(e.target).entries());
    const { error } = await reisenSignUp(formData);

    if (error) {
      errorBox.textContent = error.message || 'Não foi possível criar a conta.';
      errorBox.style.display = 'block';
      submitBtn.disabled = false;
      submitBtn.textContent = 'Criar conta';
      return;
    }
    window.location.href = 'conta.html';
  });
</script>
