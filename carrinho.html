<script src="js/main.js"></script>
<script>
  function renderCart() {
    const items = reisenCartItemsWithData();
    const root = document.getElementById('cartRoot');
    if (items.length === 0) {
      root.innerHTML = `<div class="empty-state"><div class="ico">🛒</div><h3>Seu carrinho está vazio</h3><p>Explore a loja e adicione produtos.</p><a href="loja.html" class="btn btn-primary">Ir para a loja</a></div>`;
      return;
    }
    root.innerHTML = `
      <div class="cart-layout">
        <div class="card">
          <div id="cartItems"></div>
        </div>
        <div class="card">
          <h3>Resumo do pedido</h3>
          <div class="summary-row"><span>Subtotal</span><span>${reisenFormatBRL(reisenCartTotal())}</span></div>
          <div class="summary-row"><span>Frete</span><span>Calculado no checkout</span></div>
          <div class="summary-row total"><span>Total</span><span>${reisenFormatBRL(reisenCartTotal())}</span></div>
          <a href="checkout.html" class="btn btn-primary btn-block" style="margin-top:16px;">Finalizar compra</a>
          <a href="loja.html" class="btn btn-ghost btn-block" style="margin-top:10px;">Continuar comprando</a>
        </div>
      </div>`;

    document.getElementById('cartItems').innerHTML = items.map(i => `
      <div class="cart-item">
        <div class="thumb">${i.product.emoji}</div>
        <div>
          <div style="font-weight:700;color:var(--silver-bright);">${i.product.name}</div>
          <div class="form-note mb-0">${reisenFormatBRL(i.product.price)} / un.</div>
        </div>
        <div class="qty-control">
          <button onclick="reisenUpdateQty('${i.id}', ${i.qty - 1}); renderCart();">−</button>
          <input type="number" value="${i.qty}" min="1" onchange="reisenUpdateQty('${i.id}', this.value); renderCart();">
          <button onclick="reisenUpdateQty('${i.id}', ${i.qty + 1}); renderCart();">+</button>
        </div>
        <div style="font-weight:700;color:var(--cyan-2);">${reisenFormatBRL(i.subtotal)}</div>
        <a href="#" class="remove-link" onclick="reisenRemoveFromCart('${i.id}'); renderCart(); return false;">Remover</a>
      </div>`).join('');
  }
  renderCart();
</script>
